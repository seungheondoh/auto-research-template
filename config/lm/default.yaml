project: "lm"
model_name: default
model_path: Qwen/Qwen3-0.6B
steps: 1000
logdir: ./exp
expdir: ${logdir}/${project}/${model_name}
precision: "bf16-mixed"

model:
  target: src.trainers.lm_trainer.LMTrainer
  params:
    cfg:
      trainer_type: lm
      expdir: ${expdir}
      # LLM backbone
      model_path: ${model_path}
      cache_dir: ./cache
      # LoRA
      apply_lora: true
      lora_rank: 64
      lora_alpha: 128
      lora_target_modules: [q_proj, k_proj, v_proj, o_proj]
      lora_dropout: 0.05
      # Multimodal conditioning (set use_multimodal: true to enable)
      use_multimodal: false
      conditioning_type: prefix   # prefix | cross_attn | adaLN
      encoder_out_dim: 768
      # Training
      steps: ${steps}
      lr: 5.0e-5
      warmup_steps: 50
      weight_decay: 0.01
      betas: [0.9, 0.99]
      precision: ${precision}
      activation_checkpointing: true
      max_seq_len: 512

data:
  target: src.data.datamodule.ResearchDataModule
  params:
    cfg:
      data_dir: ./data
      batch_size: 4
      num_workers: 4
      val_split: 0.05

lightning:
  logdir: ${logdir}
  version_name: ${model_name}
  slack_notify_every_n_epochs: 1
  obsidian_log_every_n_epochs: 1
  callbacks:
    save_checkpoint:
      target: lightning.pytorch.callbacks.ModelCheckpoint
      params:
        dirpath: ${expdir}
        monitor: val_loss
        mode: min
        filename: "{epoch}-{step}-{val_loss:.2f}"
        save_last: true
        every_n_train_steps: 500
    learning_rate:
      target: lightning.pytorch.callbacks.LearningRateMonitor
      params:
        logging_interval: step
  trainer:
    benchmark: true
    accelerator: gpu
    strategy: ddp
    max_steps: ${steps}
    log_every_n_steps: 10
    precision: ${precision}
    check_val_every_n_epoch: 1
    num_sanity_val_steps: 1
    gradient_clip_val: 1.0
    accumulate_grad_batches: 1
