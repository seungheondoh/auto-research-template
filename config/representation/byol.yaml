project: "representation"
model_name: byol
steps: 50000
logdir: ./exp
expdir: ${logdir}/${project}/${model_name}
precision: "bf16-mixed"
image_size: 64

model:
  target: src.trainers.representation_trainer.RepresentationTrainer
  params:
    cfg:
      trainer_type: representation
      model_type: byol
      expdir: ${expdir}
      in_channels: 3
      embed_dim: 256
      proj_dim: 128
      byol_momentum: 0.996
      steps: ${steps}
      lr: 3.0e-4
      warmup_steps: 1000
      weight_decay: 0.01
      betas: [0.9, 0.999]
      precision: ${precision}

data:
  target: src.data.datamodule.ResearchDataModule
  params:
    cfg:
      data_dir: ./data
      image_size: ${image_size}
      batch_size: 256
      num_workers: 8
      val_split: 0.05

lightning:
  logdir: ${logdir}
  version_name: ${model_name}
  slack_notify_every_n_epochs: 1
  obsidian_log_every_n_epochs: 1
  callbacks:
    save_checkpoint:
      target: lightning.pytorch.callbacks.ModelCheckpoint
      params:
        dirpath: ${expdir}
        monitor: val_loss
        mode: min
        filename: "{epoch}-{step}-{val_loss:.4f}"
        save_last: true
    learning_rate:
      target: lightning.pytorch.callbacks.LearningRateMonitor
      params:
        logging_interval: step
  trainer:
    benchmark: true
    accelerator: gpu
    strategy: ddp
    max_steps: ${steps}
    log_every_n_steps: 50
    precision: ${precision}
    check_val_every_n_epoch: 1
    num_sanity_val_steps: 1
